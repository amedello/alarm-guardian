<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)"/>
  
  <!-- Shield outline -->
  <path d="M 128 40 L 180 60 L 180 120 Q 180 180 128 210 Q 76 180 76 120 L 76 60 Z" 
        fill="url(#shieldGradient)" 
        stroke="#1e40af" 
        stroke-width="4"/>
  
  <!-- Lock body -->
  <rect x="108" y="130" width="40" height="50" rx="5" fill="#1e3a8a"/>
  <rect x="110" y="132" width="36" height="46" rx="4" fill="#3b82f6"/>
  
  <!-- Lock shackle -->
  <path d="M 113 130 L 113 110 Q 113 95 128 95 Q 143 95 143 110 L 143 130" 
        fill="none" 
        stroke="#1e3a8a" 
        stroke-width="8" 
        stroke-linecap="round"/>
  <path d="M 115 130 L 115 110 Q 115 98 128 98 Q 141 98 141 110 L 141 130" 
        fill="none" 
        stroke="#60a5fa" 
        stroke-width="6" 
        stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="128" cy="150" r="5" fill="#1e3a8a"/>
  <rect x="126" y="150" width="4" height="15" fill="#1e3a8a"/>
  
  <!-- Sensor dots (perimeter) -->
  <circle cx="100" cy="80" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="156" cy="80" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="90" cy="140" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="166" cy="140" r="4" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Alert indicator (top right) -->
  <circle cx="200" cy="56" r="20" fill="#ef4444"/>
  <text x="200" y="64" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="white" text-anchor="middle">!</text>
</svg>
